name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Lint, Type Check, And Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Local check script
        run: bash scripts/check.sh

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t fastapi-backend-template .
